<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Page Not Found</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Roboto", sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
        color: white;
      }

      .container {
        text-align: center;
        max-width: 500px;
        background: rgba(255, 255, 255, 0.1);
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        backdrop-filter: blur(10px);
        animation: slideUp 1s ease-out;
      }

      @keyframes slideUp {
        from {
          transform: translateY(50px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      h1 {
        font-size: 140px;
        color: #f8b400;
        margin-bottom: 20px;
        letter-spacing: 10px;
        animation: glitch 1.5s infinite;
      }

      @keyframes glitch {
        0%,
        100% {
          text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
        20% {
          text-shadow: 6px 3px 10px rgba(255, 0, 0, 0.7);
        }
        40% {
          text-shadow: 3px -3px 10px rgba(0, 255, 0, 0.7);
        }
        60% {
          text-shadow: 4px 5px 10px rgba(0, 0, 255, 0.7);
        }
      }

      p {
        font-size: 22px;
        color: #e0e0e0;
        margin-bottom: 30px;
        line-height: 1.5;
      }

      a {
        text-decoration: none;
        background: #f8b400;
        color: #333;
        padding: 15px 30px;
        border-radius: 30px;
        font-size: 18px;
        transition: background-color 0.3s ease;
      }

      a:hover {
        background-color: #ffd166;
      }

      .animation-box {
        position: absolute;
        bottom: -50px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        justify-content: center;
        gap: 10px;
      }

      .circle {
        width: 15px;
        height: 15px;
        background-color: #ffd166;
        border-radius: 50%;
        animation: bounce 1s infinite ease-in-out;
      }

      .circle:nth-child(2) {
        animation-delay: 0.2s;
      }
      .circle:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes bounce {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-15px);
        }
      }

      .server-status {
        margin-top: 20px;
        font-size: 18px;
        color: #d4e157;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .server-indicator {
        width: 12px;
        height: 12px;
        background-color: #8bc34a;
        border-radius: 50%;
        margin-right: 10px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>404</h1>
      <p>
        Sorry, the page you are looking for does not exist or has been moved.
      </p>
      <a href="/">Return Home</a>

      <div class="server-status">
        <div class="server-indicator"></div>
        <span>Server is Running Smoothly</span>
      </div>

      <div class="animation-box">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
      </div>
    </div>
  </body>
</html>
